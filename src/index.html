<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Habit Tracker</h1>
      <div class="input-section">
        <input type="text" id="habitInput" placeholder="Введіть звичку..." />
        <button id="addHabitBtn">Додати операцію</button>
      </div>

      <div class="history-section">
        <h3>Історія звичок</h3>
        <ul id="habitList" class="transaction-list">
          <!-- Сюди JS буде додавати нові елементи -->
        </ul>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
